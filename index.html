<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C4551A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Заказ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page-catalog" class="page active page-wrap">
  <header class="app-header" id="main-header">
    <div id="hdr-logo" class="logo-emoji">🥮</div>
    <div><h1 id="hdr-name">…</h1><div class="subtitle" id="hdr-tag"></div></div>
    <div class="header-right">
      <button class="cart-icon-btn" onclick="goPage('cart');renderCart()">🛒 <span class="cart-cnt" id="cart-count">0</span></button>
      <button class="btn-ghost" onclick="doLogout()" style="font-size:16px;padding:6px 10px" title="Выйти">↩</button>
      <div style="position:relative">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLangMenu()">🌐</button>
        <div id="lang-menu" style="display:none;position:absolute;right:0;top:38px;background:var(--bgc);border:1px solid var(--bdr);border-radius:var(--rsm);overflow:hidden;z-index:200;box-shadow:var(--sh)">
          <button onclick="setLang('ru')" style="display:block;width:100%;padding:10px 18px;background:none;border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:15px;text-align:left;color:var(--text)">🇷🇺 Русский</button>
          <button onclick="setLang('en')" style="display:block;width:100%;padding:10px 18px;background:none;border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:15px;text-align:left;color:var(--text)">🇬🇧 English</button>
          <button onclick="setLang('es')" style="display:block;width:100%;padding:10px 18px;background:none;border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:15px;text-align:left;color:var(--text)">🇪🇸 Español</button>
        </div>
      </div>
    </div>
  </header>
  <div id="user-banner" style="display:none;padding:10px 16px;background:var(--brand-lt);border-bottom:1px solid #E8C4A8;font-size:14px"></div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="product-list-wrap" id="product-list"></div>
  <div class="sticky-cart" id="sticky-cart">
    <button class="btn btn-primary" style="width:100%;font-size:16px;padding:14px;border-radius:var(--r)" onclick="goPage('cart');renderCart()">
      🛒 <span id="sticky-label"></span>
    </button>
  </div>
</div>

<div id="page-cart" class="page page-wrap">
  <header class="app-header">
    <button class="btn-ghost" onclick="goPage('catalog')" id="btn-back-cart"></button>
    <h1 style="font-size:18px" id="hdr-cart"></h1>
  </header>
  <div id="cart-empty" class="empty-state" style="display:none"><div class="eicon">🛒</div><p id="cart-empty-txt"></p></div>
  <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px" id="cart-list"></div>
  <div class="order-summary" id="cart-summary" style="display:none">
    <div class="sum-row"><span id="lbl-items"></span><span id="sum-items"></span></div>
    <div class="sum-row total"><span id="lbl-total"></span><span id="sum-total"></span></div>
  </div>
  <div style="padding:0 16px 20px" id="cart-cta"></div>
</div>

<div id="page-checkout" class="page page-wrap">
  <header class="app-header">
    <button class="btn-ghost" onclick="goPage('cart')" id="btn-back-co"></button>
    <h1 style="font-size:18px" id="hdr-checkout"></h1>
  </header>
  <div class="checkout-wrap">
    <div class="section-title" id="lbl-yourdata"></div>
    <div class="form-group"><label id="lbl-name"></label><input type="text" id="ch-name"></div>
    <div class="form-group"><label id="lbl-phone"></label><input type="tel" id="ch-phone"></div>
    <div class="form-group"><label id="lbl-addr"></label><textarea id="ch-addr" rows="2"></textarea></div>
    <div class="section-title" id="lbl-delivery"></div>
    <div class="form-group"><label id="lbl-date"></label><input type="date" id="ch-date"></div>
    <div class="form-group">
      <label id="lbl-time"></label>
      <select id="ch-time">
        <option value="" id="opt-any"></option>
        <option>08:00–10:00</option><option>10:00–12:00</option>
        <option>12:00–14:00</option><option>14:00–16:00</option>
        <option>16:00–18:00</option><option>18:00–20:00</option>
      </select>
    </div>
    <div class="section-title" id="lbl-payment-hdr"></div>
    <div class="pay-opts" id="pay-opts"></div>
    <div id="pay-note" class="info-box" style="margin-top:10px;display:none"></div>
    <div class="order-summary" style="margin:16px 0">
      <div class="sum-row total"><span id="lbl-topay"></span><span id="ch-total"></span></div>
    </div>
    <button class="btn btn-green" style="width:100%;font-size:17px;padding:15px;border-radius:var(--r)" onclick="submitOrder()" id="btn-confirm"></button>
  </div>
</div>

<div id="page-success" class="page page-wrap">
  <div class="success-screen">
    <div class="check">🎉</div>
    <h2 id="success-title"></h2>
    <p id="success-msg"></p>
    <div style="margin-top:28px">
      <button class="btn btn-outline" style="padding:13px 30px;font-size:16px" onclick="newOrder()" id="btn-neworder"></button>
    </div>
  </div>
</div>

<div id="page-orders" class="page page-wrap">
  <header class="app-header">
    <h1 style="font-size:18px" id="hdr-myorders"></h1>
  </header>
  <div id="my-orders-list" style="padding:14px 16px 80px"></div>
</div>

<!-- Product detail sheet -->
<div class="sheet-overlay" id="product-sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div id="sheet-img-wrap"></div>
    <div class="sheet-body">
      <div class="sheet-name" id="sheet-name"></div>
      <div class="sheet-price" id="sheet-price"></div>
      <div class="sheet-desc" id="sheet-desc"></div>
      <div class="ingredients-block" id="sheet-ing-block" style="display:none">
        <div class="ingredients-title">Ingredientes / Состав</div>
        <div class="ingredients-text" id="sheet-ing"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <div class="qty-control" id="sheet-qty-control"></div>
        <button class="btn btn-green" style="padding:12px 24px;font-size:16px" onclick="addFromSheet()" id="sheet-add-btn"></button>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="#" onclick="goPage('catalog');return false" id="nav-catalog" class="active"><span class="ni">🛍️</span><span id="nav-catalog-lbl"></span></a>
  <a href="#" onclick="goPage('cart');renderCart();return false" id="nav-cart"><span class="ni">🛒</span><span id="nav-cart-lbl"></span></a>
  <a href="#" onclick="goPage('orders');renderMyOrders();return false" id="nav-orders"><span class="ni">📋</span><span id="nav-orders-lbl"></span></a>
</nav>

<div id="toast" class="toast"></div>

<script src="i18n.js"></script>
<script src="core.js"></script>
<script type="module">
import { fbGetSettings, fbGetCatalog, fbFindClient, fbAddOrder, fbGetOrders } from './firebase.js';

if (!getCurrentUser()) { window.location.href = 'login.html'; }

const EMOJIS = {Pan:'🍞',Piroski:'🥟',Pirogi:'🥮',Vypechka:'🍞',Sladosti:'🍯',Tartas:'🎂',Other:'🍴'};
let currentCat = null;
let selectedPay = 'cash';
let sheetProductId = null;
let _catalog = [];
let _orders = [];

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  showLoading('Loading…');
  applyTheme(); applyFont();

  try {
    // Load settings
    const s = await fbGetSettings();
    if (s) { window._settings = Object.assign({}, window._settings||{}, s); saveSettingsCache(window._settings); }
    applyTheme(); applyFont();

    // Load catalog
    _catalog = await fbGetCatalog();
    if (!_catalog.length) {
      // Seed default catalog on first run
      _catalog = [
        { id:'1', name:'Barra brioche', price:4.5, unit:'sht', category:'Pan', available:true, minQty:1, photo:null, description:'Pan brioche artesano', ingredients:'Masa madre, harina de trigo fuerza, leche, mantequilla, azúcar, sal, yema de huevo. ¡Sin levadura!' },
        { id:'2', name:'Piroski de carne', price:2.5, unit:'sht', category:'Piroski', available:true, minQty:5, photo:null, description:'', ingredients:'' },
        { id:'3', name:'Piroski de col', price:2.0, unit:'sht', category:'Piroski', available:true, minQty:5, photo:null, description:'', ingredients:'' },
      ];
    }
    window._catalog = _catalog;
    currentCat = t('all');

    // Load my orders
    _orders = await fbGetOrders();

    hideLoading();
    initStrings();
    renderCatalog();
  } catch(e) {
    console.error(e);
    hideLoading();
    showToast('Connection error — offline mode');
    currentCat = t('all');
    initStrings();
    renderCatalog();
  }
}

function initStrings() {
  const s = getSettings();
  document.getElementById('hdr-name').textContent = s.shopName || t('appName');
  document.getElementById('hdr-tag').textContent  = s.shopTagline || t('appTagline');
  document.title = s.shopName || t('appName');
  if (s.logo) {
    const img = document.createElement('img'); img.src=s.logo; img.className='logo-img';
    document.getElementById('hdr-logo').replaceWith(img);
  }
  ['btn-back-cart','btn-back-co'].forEach(id=>document.getElementById(id).textContent=t('back'));
  document.getElementById('hdr-cart').textContent      = t('cart');
  document.getElementById('hdr-checkout').textContent  = t('orderTitle');
  document.getElementById('lbl-yourdata').textContent  = t('yourData');
  document.getElementById('lbl-name').textContent      = t('name')+' *';
  document.getElementById('lbl-phone').textContent     = t('phone')+' *';
  document.getElementById('lbl-addr').textContent      = t('address');
  document.getElementById('ch-addr').placeholder       = t('addressPlaceholder');
  document.getElementById('lbl-delivery').textContent  = t('deliveryDate');
  document.getElementById('lbl-date').textContent      = t('date')+' *';
  document.getElementById('lbl-time').textContent      = t('time');
  document.getElementById('opt-any').textContent       = t('timeAny');
  document.getElementById('lbl-payment-hdr').textContent = t('paymentMethod');
  document.getElementById('lbl-topay').textContent     = t('toPay');
  document.getElementById('btn-confirm').textContent   = t('confirmOrder');
  document.getElementById('lbl-items').textContent     = t('items');
  document.getElementById('lbl-total').textContent     = t('total');
  document.getElementById('cart-empty-txt').textContent= t('cartEmpty');
  document.getElementById('success-title').textContent = t('orderSuccess');
  document.getElementById('hdr-myorders').textContent  = t('myOrders');
  document.getElementById('btn-neworder').textContent  = t('newOrder');
  document.getElementById('nav-catalog-lbl').textContent = t('catalog');
  document.getElementById('nav-cart-lbl').textContent    = t('cart');
  document.getElementById('nav-orders-lbl').textContent  = t('orders');
  document.getElementById('ch-name').placeholder  = t('namePlaceholder');
  document.getElementById('ch-phone').placeholder = t('phonePlaceholder');
  const user = getCurrentUser();
  if (user && !user.guest) {
    const displayName = user.name || user.login || 'Cliente';
    document.getElementById('ch-name').value = displayName;
    let txt = '👤 '+displayName;
    if (user.discount>0) txt += ' · '+t('discount')+': −'+user.discount+'%';
    else if (user.coeff&&user.coeff!==1) txt += ' · ×'+user.coeff;
    const b=document.getElementById('user-banner'); b.textContent=txt; b.style.display='block';
  }
  buildPaymentOpts();
  const tom=new Date(); tom.setDate(tom.getDate()+1);
  document.getElementById('ch-date').value=tom.toISOString().split('T')[0];
  document.getElementById('ch-date').min=new Date().toISOString().split('T')[0];
}

function renderCatalog() {
  const catalog = _catalog.filter(p=>p.available!==false);
  const cats = [t('all'), ...new Set(catalog.map(p=>p.category))];
  document.getElementById('cat-tabs').innerHTML = cats.map(c=>
    `<button class="cat-tab ${c===currentCat?'active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')">
      ${c===t('all')?c:(EMOJIS[c]||'🍴')+' '+c}
    </button>`).join('');
  const items = currentCat===t('all') ? catalog : catalog.filter(p=>p.category===currentCat);
  const cart = getCart();
  const el = document.getElementById('product-list');
  if (!items.length){el.innerHTML='<div class="empty-state"><div class="eicon">😔</div></div>';return;}
  el.innerHTML = items.map(p=>{
    const inCart=cart.find(c=>c.id===p.id); const qty=inCart?inCart.qty:0;
    const cp=clientPrice(p.price);
    const emoji=EMOJIS[p.category]||'🍴';
    const discBadge=cp!==p.price?`<span class="discount-badge">−${Math.round((1-cp/p.price)*100)}%</span>`:'';
    const thumb=p.photo?`<div class="product-thumb"><img src="${p.photo}" alt="${p.name}"></div>`:`<div class="product-thumb">${emoji}</div>`;
    const minInfo=p.minQty>1?`<div class="product-meta">${t('minQty')} ${p.minQty} ${t('unit_'+p.unit)||p.unit}</div>`:'';
    return `<div class="product-card" onclick="openSheet('${p.id}')">
      ${thumb}
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${formatPrice(cp)} <span style="font-size:12px;color:var(--text3);font-weight:400">/ ${t('unit_'+p.unit)||p.unit}</span>${discBadge}</div>
        ${minInfo}
      </div>
      <div class="qty-control" onclick="event.stopPropagation()" id="qc-${p.id}">
        ${qty===0
          ?`<button class="btn btn-primary btn-sm" onclick="addToCart('${p.id}')">${t('addToCart')}</button>`
          :`<button class="qty-btn" onclick="chQty('${p.id}',-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="chQty('${p.id}',1)">+</button>`}
      </div>
    </div>`;
  }).join('');
  updateCartBadge(); updateSticky();
}

window.selectCat = c => { currentCat=c; renderCatalog(); };

window.openSheet = id => {
  const p=_catalog.find(x=>x.id===id); if(!p) return;
  sheetProductId=id;
  const cp=clientPrice(p.price);
  const emoji=EMOJIS[p.category]||'🍴';
  document.getElementById('sheet-img-wrap').innerHTML=p.photo
    ?`<div class="sheet-img"><img src="${p.photo}" alt="${p.name}"></div>`
    :`<div class="sheet-img">${emoji}</div>`;
  document.getElementById('sheet-name').textContent=p.name;
  document.getElementById('sheet-price').textContent=formatPrice(cp)+' / '+(t('unit_'+p.unit)||p.unit);
  document.getElementById('sheet-desc').textContent=p.description||'';
  const ing=p.ingredients||'';
  document.getElementById('sheet-ing-block').style.display=ing?'block':'none';
  document.getElementById('sheet-ing').textContent=ing;
  document.getElementById('sheet-add-btn').textContent=t('addToCart');
  updateSheetQty();
  document.getElementById('product-sheet').classList.add('open');
};

function updateSheetQty() {
  const cart=getCart(); const inCart=cart.find(c=>c.id===sheetProductId);
  const qty=inCart?inCart.qty:0;
  const ctrl=document.getElementById('sheet-qty-control');
  ctrl.innerHTML=qty>0?`<button class="qty-btn" onclick="chQty('${sheetProductId}',-1);updateSheetQty()">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="chQty('${sheetProductId}',1);updateSheetQty()">+</button>`:'';
}
window.updateSheetQty = updateSheetQty;
window.closeSheet = () => document.getElementById('product-sheet').classList.remove('open');
window.addFromSheet = () => { addToCart(sheetProductId); updateSheetQty(); };

window.addToCart = id => {
  const p=_catalog.find(x=>x.id===id); const minQ=p?(p.minQty||1):1;
  let cart=getCart(); const ex=cart.find(c=>c.id===id);
  if(ex){ex.qty+=1;}else{cart.push({id,qty:minQ});}
  saveCart(cart); renderCatalog();
};
window.chQty = (id,delta) => {
  let cart=getCart(); const item=cart.find(c=>c.id===id);
  const p=_catalog.find(x=>x.id===id); const minQ=p?(p.minQty||1):1;
  if(item){item.qty+=delta;if(item.qty<minQ)cart=cart.filter(c=>c.id!==id);}
  saveCart(cart); renderCatalog();
};

function updateCartBadge(){document.getElementById('cart-count').textContent=getCart().reduce((s,c)=>s+c.qty,0);}
function updateSticky(){
  const cart=getCart(); const n=cart.reduce((s,c)=>s+c.qty,0);
  const total=cart.reduce((s,c)=>{const p=_catalog.find(x=>x.id===c.id);return s+(p?clientPrice(p.price)*c.qty:0);},0);
  const el=document.getElementById('sticky-cart');
  if(n>0){el.classList.add('visible');document.getElementById('sticky-label').textContent=t('checkout')+' · '+formatPrice(total);}
  else el.classList.remove('visible');
}

window.renderCart = () => {
  const cart=getCart(); const listEl=document.getElementById('cart-list');
  const emptyEl=document.getElementById('cart-empty');
  const sumEl=document.getElementById('cart-summary'); const ctaEl=document.getElementById('cart-cta');
  if(!cart.length){emptyEl.style.display='block';listEl.style.display='none';sumEl.style.display='none';ctaEl.innerHTML='';return;}
  emptyEl.style.display='none';listEl.style.display='flex';sumEl.style.display='block';
  let total=0,count=0;
  listEl.innerHTML=cart.map(item=>{
    const p=_catalog.find(x=>x.id===item.id);if(!p)return'';
    const cp=clientPrice(p.price);const sub=cp*item.qty;total+=sub;count+=item.qty;
    return `<div class="product-card">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div style="font-size:14px;color:var(--text2);margin-top:4px">${item.qty} × ${formatPrice(cp)} = ${formatPrice(sub)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="cartChQty('${p.id}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="cartChQty('${p.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sum-items').textContent=count;
  document.getElementById('sum-total').textContent=formatPrice(total);
  document.getElementById('ch-total').textContent=formatPrice(total);
  ctaEl.innerHTML=`<button class="btn btn-primary" style="width:100%;font-size:16px;padding:14px;border-radius:var(--r)" onclick="goPage('checkout')">${t('checkout')} →</button>`;
};

window.cartChQty = (id,delta) => {
  let cart=getCart();const item=cart.find(c=>c.id===id);
  const p=_catalog.find(x=>x.id===id);const minQ=p?(p.minQty||1):1;
  if(item){item.qty+=delta;if(item.qty<minQ)cart=cart.filter(c=>c.id!==id);}
  saveCart(cart);renderCart();updateCartBadge();
};

const PAY_NOTES={
  bizum:()=>{const s=getSettings();return s.bizumNumber?`📱 Bizum: <b>${s.bizumNumber}</b> — ${t('bizumNote')}`:t('bizumNote');},
  revolut:()=>{const s=getSettings();return s.revolutHandle?`💜 Revolut: <b>${s.revolutHandle}</b> — ${t('revolutNote')}`:t('revolutNote');},
  invoice:()=>{const s=getSettings();return s.invoiceDetails?`📄 ${s.invoiceDetails}<br>${t('invoiceNote')}`:t('invoiceNote');},
  stripe:()=>t('stripeNote'),cash:()=>'',
};
function buildPaymentOpts(){
  const s=getSettings();
  const opts=[
    {val:'cash',icon:'💵',label:t('payLater')},
    {val:'bizum',icon:'📱',label:t('payBizum')},
    {val:'revolut',icon:'💜',label:t('payRevolut')},
    {val:'stripe',icon:'💳',label:t('payStripe'),hide:!s.stripeKey},
    {val:'invoice',icon:'📄',label:t('payInvoice')},
  ].filter(o=>!o.hide);
  document.getElementById('pay-opts').innerHTML=opts.map(o=>
    `<div class="pay-opt ${o.val===selectedPay?'selected':''}" data-val="${o.val}" onclick="selectPay('${o.val}')">
      <span class="pay-icon">${o.icon}</span><span>${o.label}</span>
    </div>`).join('');
  updatePayNote();
}
window.selectPay = val => {
  selectedPay=val;
  document.querySelectorAll('.pay-opt').forEach(e=>e.classList.toggle('selected',e.dataset.val===val));
  updatePayNote();
};
function updatePayNote(){
  const note=PAY_NOTES[selectedPay]?.()||'';
  const el=document.getElementById('pay-note');el.innerHTML=note;el.style.display=note?'block':'none';
}

window.submitOrder = async () => {
  const name=document.getElementById('ch-name').value.trim();
  const phone=document.getElementById('ch-phone').value.trim();
  const date=document.getElementById('ch-date').value;
  if(!name){showToast(t('fillName'));return;}
  if(!phone){showToast(t('fillPhone'));return;}
  if(!date){showToast(t('fillDate'));return;}
  const cart=getCart();
  const total=cart.reduce((s,c)=>{const p=_catalog.find(x=>x.id===c.id);return s+(p?clientPrice(p.price)*c.qty:0);},0);
  const user=getCurrentUser();
  const order={
    date:new Date().toISOString(),
    customer:{name,phone,address:document.getElementById('ch-addr').value,userId:user?.id||null,userName:user?.name||null},
    delivery:{date,time:document.getElementById('ch-time').value},
    payment:selectedPay,
    items:cart.map(c=>{const p=_catalog.find(x=>x.id===c.id);return{id:c.id,name:p?.name,qty:c.qty,price:clientPrice(p?.price||0)};}),
    total,status:'new',lang:detectLang(),
  };
  try {
    showLoading('Sending order…');
    await fbAddOrder(order);
    saveCart([]);
    hideLoading();
    const dFmt=new Date(date).toLocaleDateString(detectLang(),{day:'numeric',month:'long'});
    document.getElementById('success-msg').textContent=`${name} — ${formatPrice(total)}, ${dFmt}. ${t('orderSuccessMsg')}`;
    goPage('success');
  } catch(e) {
    hideLoading(); showToast('Error saving order');
  }
};

window.renderMyOrders = async () => {
  const user=getCurrentUser();
  showLoading('Loading orders…');
  try { _orders=await fbGetOrders(); } catch(e){}
  hideLoading();
  const mine=user&&!user.guest?_orders.filter(o=>o.customer?.userId===user.id):_orders;
  const el=document.getElementById('my-orders-list');
  const SC={new:'badge-new',confirmed:'badge-confirmed',done:'badge-done',cancelled:'badge-cancelled'};
  const SL={new:t('statusNew'),confirmed:t('statusConfirmed'),done:t('statusDone'),cancelled:t('statusCancelled')};
  if(!mine.length){el.innerHTML=`<div class="empty-state"><div class="eicon">📋</div><p>${t('noOrders')}</p></div>`;return;}
  el.innerHTML=mine.map(o=>{
    const d=new Date(o.date).toLocaleDateString(detectLang(),{day:'numeric',month:'short',year:'numeric'});
    const delD=o.delivery?.date?new Date(o.delivery.date).toLocaleDateString(detectLang(),{day:'numeric',month:'long'}):'';
    return`<div class="order-card">
      <div class="order-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div>
          <div style="font-size:12px;color:var(--text3);font-weight:700">#${String(o.id).slice(-6)} · ${d}</div>
          <div style="font-size:16px;font-weight:700;margin-top:2px">${formatPrice(o.total)}</div>
          ${delD?`<div style="font-size:13px;color:var(--text2);margin-top:2px">📅 ${delD}</div>`:''}
        </div>
        <span class="badge ${SC[o.status]||'badge-new'}">${SL[o.status]||o.status}</span>
      </div>
      <div class="order-body">
        <ul style="font-size:14px;color:var(--text2);margin-bottom:8px;list-style:none;padding:0">
          ${(o.items||[]).map(i=>`<li>• ${i.name} × ${i.qty} = ${formatPrice(i.price*i.qty)}</li>`).join('')}
        </ul>
      </div>
    </div>`;
  }).join('');
};

window.newOrder = () => { goPage('catalog'); renderCatalog(); };
window.doLogout = () => { clearCurrentUser(); window.location.href='login.html'; };
window.toggleLangMenu = () => { const m=document.getElementById('lang-menu');m.style.display=m.style.display==='none'?'block':'none'; };
document.addEventListener('click',e=>{if(!e.target.closest('#lang-toggle')&&!e.target.closest('#lang-menu'))document.getElementById('lang-menu').style.display='none';});

window.goPage = name => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.bottom-nav a').forEach(a=>a.classList.remove('active'));
  const map={catalog:'nav-catalog',cart:'nav-cart',orders:'nav-orders'};
  if(map[name])document.getElementById(map[name])?.classList.add('active');
  window.scrollTo(0,0);
};

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
boot();
</script>
</body>
</html>
