<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#C4551A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Вход</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div id="logo-wrap"></div>
    <h1 class="login-title" id="lt">…</h1>
    <p class="login-tagline" id="ls"></p>
    <div class="form-group"><label id="lbl-user"></label><input type="text" id="inp-login" autocomplete="username" autocapitalize="none"></div>
    <div class="form-group"><label id="lbl-pass"></label><input type="password" id="inp-pass" autocomplete="current-password"></div>
    <div id="err-msg" style="color:#c0392b;font-size:14px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;padding:14px;font-size:17px;margin-bottom:12px;border-radius:var(--r)" onclick="doLogin()" id="btn-login"></button>
    <button class="btn btn-outline" style="width:100%;padding:12px;font-size:15px;margin-bottom:24px;border-radius:var(--r)" onclick="doGuest()" id="btn-guest"></button>
    <div style="text-align:center;border-top:1px solid var(--bdr2);padding-top:16px">
      <a href="admin.html" style="font-size:14px;color:var(--text3);text-decoration:none">🔑 <span id="admin-link-txt"></span></a>
    </div>
  </div>
  <div style="margin-top:16px;display:flex;gap:8px">
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="i18n.js"></script>
<script src="core.js"></script>
<script type="module">
import { fbGetSettings, fbFindClient } from './firebase.js';

applyTheme(); applyFont();

async function initLogin() {
  showLoading('');
  try {
    const s = await fbGetSettings();
    if (s) { window._settings = Object.assign({}, window._settings||{}, s); saveSettingsCache(window._settings); applyTheme(); applyFont(); }
  } catch(e) {}
  hideLoading();

  const s = getSettings();
  if (s.logo) {
    const img=document.createElement('img');img.src=s.logo;img.className='login-logo';
    document.getElementById('logo-wrap').appendChild(img);
  } else {
    const el=document.createElement('span');el.className='login-logo-emoji';el.textContent='🥮';
    document.getElementById('logo-wrap').appendChild(el);
  }
  document.getElementById('lt').textContent  = s.shopName || t('appName');
  document.getElementById('ls').textContent  = s.shopTagline || t('appTagline');
  document.getElementById('lbl-user').textContent  = t('username');
  document.getElementById('lbl-pass').textContent  = t('password');
  document.getElementById('btn-login').textContent = t('loginBtn');
  document.getElementById('btn-guest').textContent = t('guestBtn');
  document.getElementById('admin-link-txt').textContent = t('adminPanel');
  document.title = s.shopName || t('appName');
}

document.getElementById('inp-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

window.doLogin = async () => {
  const login=document.getElementById('inp-login').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('err-msg');
  try {
    showLoading('');
    const client = await fbFindClient(login, pass);
    hideLoading();
    if (client) { setCurrentUser(client); window.location.href='index.html'; }
    else { err.textContent=t('loginError'); err.style.display='block'; }
  } catch(e) {
    hideLoading(); err.textContent=t('loginError'); err.style.display='block';
  }
};

window.doGuest = () => { setCurrentUser({guest:true,name:'Guest',discount:0,coeff:1}); window.location.href='index.html'; };

if (getCurrentUser()) window.location.href='index.html';
initLogin();
</script>
</body>
</html>
